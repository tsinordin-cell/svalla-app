<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thorkel — skärgårdsguide">
  <defs>
    <linearGradient id="sky" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#cfe0e9"/>
      <stop offset="100%" stop-color="#9cbbd0"/>
    </linearGradient>
    <linearGradient id="cap-white" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e4ebf2"/>
    </linearGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f2c8a0"/>
      <stop offset="100%" stop-color="#d8a078"/>
    </radialGradient>
    <linearGradient id="beard-tone" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#b06a3e"/>
      <stop offset="100%" stop-color="#7e4622"/>
    </linearGradient>
    <linearGradient id="jacket" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#243a58"/>
      <stop offset="100%" stop-color="#101e30"/>
    </linearGradient>
    <clipPath id="round">
      <circle cx="60" cy="60" r="58"/>
    </clipPath>
  </defs>

  <!-- BAKGRUND -->
  <circle cx="60" cy="60" r="58" fill="url(#sky)"/>

  <g clip-path="url(#round)">

    <!-- Subtil horisont långt ner -->
    <rect x="0" y="106" width="120" height="14" fill="#5d7a92" opacity="0.28"/>

    <!-- ═════════════════════════════════════════
         JACKA (mörkblå kaptensjacka med revär)
         ═════════════════════════════════════════ -->
    <path d="M 0 120
             L 8 104
             Q 18 94 34 92
             L 86 92
             Q 102 94 112 104
             L 120 120 Z"
          fill="url(#jacket)"/>

    <!-- Jack-revär (V-krage öppen) -->
    <path d="M 42 92
             L 60 108
             L 78 92
             L 74 92
             L 60 105
             L 46 92 Z"
          fill="#0a1420"/>

    <!-- SKJORTA (vit, i V mellan revären) -->
    <path d="M 48 96
             L 60 110
             L 72 96
             L 70 96
             L 60 107
             L 50 96 Z"
          fill="#ffffff"/>

    <!-- SLIPS (mörkblå, smal, precis under skjortkragen) -->
    <path d="M 58 102
             L 62 102
             L 63 118
             L 57 118 Z"
          fill="#2d4666"/>
    <path d="M 58 102 L 60 105 L 62 102 Z" fill="#1a2e48"/>

    <!-- Knappar på jackan — gyllene -->
    <circle cx="46" cy="108" r="1.2" fill="#d4a446"/>
    <circle cx="74" cy="108" r="1.2" fill="#d4a446"/>
    <circle cx="46" cy="115" r="1.2" fill="#d4a446" opacity="0.75"/>
    <circle cx="74" cy="115" r="1.2" fill="#d4a446" opacity="0.75"/>

    <!-- ═════════════════════════════════════════
         HALS (bakom skägget)
         ═════════════════════════════════════════ -->
    <rect x="52" y="80" width="16" height="16" fill="#d8a078"/>

    <!-- ═════════════════════════════════════════
         HUVUD (hud-oval)
         ═════════════════════════════════════════ -->
    <ellipse cx="60" cy="56" rx="24" ry="27" fill="url(#skin)"/>

    <!-- Öron -->
    <ellipse cx="37" cy="58" rx="3.2" ry="5" fill="#d8a078"/>
    <ellipse cx="83" cy="58" rx="3.2" ry="5" fill="#d8a078"/>
    <path d="M 36 57 Q 36 59 37 60" stroke="#a86844" stroke-width="0.5" fill="none" opacity="0.6"/>
    <path d="M 84 57 Q 84 59 83 60" stroke="#a86844" stroke-width="0.5" fill="none" opacity="0.6"/>

    <!-- Hår som sticker ut under mössan (rödbrunt, på tinningarna) -->
    <path d="M 35 46 Q 33 52 36 56 Q 38 52 40 48 Z" fill="#8e5632"/>
    <path d="M 85 46 Q 87 52 84 56 Q 82 52 80 48 Z" fill="#8e5632"/>

    <!-- KIND-RODNAD — lätt, ger liv -->
    <ellipse cx="44" cy="60" rx="5" ry="3.5" fill="#d6694c" opacity="0.4"/>
    <ellipse cx="76" cy="60" rx="5" ry="3.5" fill="#d6694c" opacity="0.4"/>

    <!-- ═════════════════════════════════════════
         ÖGON — tydligt under skärmen (skärmen slutar y=50)
         ═════════════════════════════════════════ -->
    <ellipse cx="50" cy="54" rx="3.8" ry="3" fill="#ffffff"/>
    <ellipse cx="70" cy="54" rx="3.8" ry="3" fill="#ffffff"/>
    <!-- Iris (varm brun, matchar skägget) -->
    <circle cx="50" cy="54" r="2.2" fill="#5e3a24"/>
    <circle cx="70" cy="54" r="2.2" fill="#5e3a24"/>
    <!-- Pupill -->
    <circle cx="50" cy="54" r="1.3" fill="#1a0e06"/>
    <circle cx="70" cy="54" r="1.3" fill="#1a0e06"/>
    <!-- Highlight -->
    <circle cx="50.7" cy="53.3" r="0.6" fill="#ffffff"/>
    <circle cx="70.7" cy="53.3" r="0.6" fill="#ffffff"/>

    <!-- ÖGONBRYN (rödbruna, tjocka, matchar skägget) -->
    <!-- Ligger precis under skärmens nederkant, syns som vänlig markering -->
    <path d="M 44 49.5 Q 48 47.5 54 49"
          stroke="#8e5632" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M 66 49 Q 72 47.5 76 49.5"
          stroke="#8e5632" stroke-width="2.4" fill="none" stroke-linecap="round"/>

    <!-- Leende-rynkor under ögonen -->
    <path d="M 42 58 Q 46 57 49 57.5" stroke="#a86844" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M 71 57.5 Q 74 57 78 58" stroke="#a86844" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- ═════════════════════════════════════════
         NÄSA — proffsigt definierad
         ═════════════════════════════════════════ -->
    <path d="M 60 58
             Q 57 64 57 68
             Q 58 70 60 70
             Q 62 70 63 68
             Q 63 64 60 58 Z"
          fill="#d8a078" opacity="0.95"/>
    <!-- Näsborrar-antydan -->
    <ellipse cx="58.5" cy="69" rx="0.9" ry="0.6" fill="#a86844" opacity="0.5"/>
    <ellipse cx="61.5" cy="69" rx="0.9" ry="0.6" fill="#a86844" opacity="0.5"/>
    <!-- Näsans highlight (ljus linje ovanpå) -->
    <path d="M 59.5 61 Q 59.5 65 59.5 68" stroke="#f2c8a0" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- ═════════════════════════════════════════
         SKÄGG — RÖDBRUNT, TRIMMAT, FYLLIGT
         Börjar vid kinderna (y=62), går ner till y=98
         Modern "kapten-skägg" — inte för långt
         ═════════════════════════════════════════ -->
    <path d="M 36 62
             C 30 70 28 82 30 90
             C 34 98 44 103 60 103
             C 76 103 86 98 90 90
             C 92 82 90 70 84 62
             C 82 66 78 69 74 70
             Q 68 72 60 72
             Q 52 72 46 70
             C 42 69 38 66 36 62 Z"
          fill="url(#beard-tone)"/>

    <!-- Skäggtextur — varma strimmor för volym -->
    <g stroke="#c07a4a" stroke-width="0.7" fill="none" opacity="0.4">
      <path d="M 38 74 Q 40 86 38 98"/>
      <path d="M 46 78 Q 47 90 46 100"/>
      <path d="M 54 80 Q 54 92 54 102"/>
      <path d="M 60 81 Q 60 92 60 102"/>
      <path d="M 66 80 Q 66 92 66 102"/>
      <path d="M 74 78 Q 73 90 74 100"/>
      <path d="M 82 74 Q 80 86 82 98"/>
    </g>

    <!-- Mörkare partier för djup -->
    <g stroke="#6c3a1e" stroke-width="0.5" fill="none" opacity="0.5">
      <path d="M 42 82 Q 42 92 42 98"/>
      <path d="M 78 82 Q 78 92 78 98"/>
      <path d="M 50 86 Q 50 96 50 100"/>
      <path d="M 70 86 Q 70 96 70 100"/>
    </g>

    <!-- ═════════════════════════════════════════
         MUSTASCH — rödbrun, välansad, över överläppen
         ═════════════════════════════════════════ -->
    <path d="M 44 68
             Q 52 74 60 74
             Q 68 74 76 68
             Q 72 78 60 78
             Q 48 78 44 68 Z"
          fill="url(#beard-tone)"/>

    <!-- Mustasch-mittenpart (mörkare under näsan) -->
    <path d="M 56 70 Q 60 72 64 70 Q 62 74 60 74 Q 58 74 56 70 Z"
          fill="#6c3a1e" opacity="0.5"/>

    <!-- MUN — tydligt leende mellan mustasch och skägg -->
    <path d="M 52 78 Q 60 82 68 78"
          stroke="#4a2818" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Tandantydan -->
    <path d="M 55 79 Q 60 80 65 79"
          stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- ═════════════════════════════════════════
         KAPTENSMÖSSA — VIT topp, mörkblått band, svart skärm
         ═════════════════════════════════════════ -->

    <!-- Mössa TOPP (vit) -->
    <path d="M 26 36
             L 26 22
             Q 26 10 40 10
             L 80 10
             Q 94 10 94 22
             L 94 36 Z"
          fill="url(#cap-white)"/>

    <!-- Toppens övre kant (subtil skugga) -->
    <path d="M 28 14 Q 40 12 60 12 Q 80 12 92 14 Q 80 16 60 16 Q 40 16 28 14 Z"
          fill="#cfd8e2" opacity="0.45"/>

    <!-- Mösstoppens kant mot bandet -->
    <path d="M 26 36 L 94 36" stroke="#c0c8d0" stroke-width="0.5"/>

    <!-- MÖRKT BAND runt mössan -->
    <path d="M 24 36
             L 24 44
             Q 60 47 96 44
             L 96 36 Z"
          fill="#1e3a5f"/>

    <!-- Band-detalj — gyllene tvinnat snöre -->
    <path d="M 26 40 L 94 40"
          stroke="#d4a446" stroke-width="0.8" fill="none" opacity="0.9"/>
    <g fill="#d4a446">
      <circle cx="30" cy="40" r="0.7"/>
      <circle cx="40" cy="40" r="0.7"/>
      <circle cx="50" cy="40" r="0.7"/>
      <circle cx="70" cy="40" r="0.7"/>
      <circle cx="80" cy="40" r="0.7"/>
      <circle cx="90" cy="40" r="0.7"/>
    </g>

    <!-- GYLLENE ANKAR-EMBLEM på bandet (centrerat) -->
    <g transform="translate(60, 40)">
      <circle cx="0" cy="0" r="3.5" fill="#d4a446"/>
      <circle cx="0" cy="0" r="3.5" fill="none" stroke="#8a6e2a" stroke-width="0.4"/>
      <g stroke="#1e3a5f" stroke-width="0.7" fill="none" stroke-linecap="round">
        <circle cx="0" cy="-1.5" r="0.45" fill="#1e3a5f" stroke="none"/>
        <line x1="0" y1="-1.1" x2="0" y2="1.6"/>
        <line x1="-1.2" y1="-0.1" x2="1.2" y2="-0.1"/>
        <path d="M -1.5 1.5 Q 0 2.2 1.5 1.5"/>
      </g>
    </g>

    <!-- SKÄRM (svart visir, glansig) -->
    <path d="M 22 44
             Q 34 50 46 51
             L 74 51
             Q 86 50 98 44
             L 96 50
             Q 86 55 74 56
             L 46 56
             Q 34 55 24 50 Z"
          fill="#0f1e30"/>
    <!-- Skärm-highlight -->
    <path d="M 28 49 Q 60 53 92 49 Q 60 51 28 49 Z" fill="#3a4a60" opacity="0.6"/>

  </g>

  <!-- Yttre avatarring -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.9"/>
  <circle cx="60" cy="60" r="57.2" fill="none" stroke="#1a2e48" stroke-width="0.6" opacity="0.3"/>
</svg>
