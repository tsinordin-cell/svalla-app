name: Season Kickoff Push

# Skickas en gång: 1 maj 2026 kl 09:00 UTC (= 11:00 lokal tid svensk sommartid).
# Efter det kan workflow_dispatch användas för manuell test i off-season.
on:
  schedule:
    # Minut Timme Dag Månad Veckodag — 1 maj kl 09:00 UTC
    - cron: '0 9 1 5 *'
  workflow_dispatch:

jobs:
  send-kickoff:
    runs-on: ubuntu-latest
    # Skydd: cron triggas även 2027, 2028 — gate på år
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.run_started_at, '2026') }}
    steps:
      - name: Trigger season-kickoff push
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET https://svalla.se/api/push/season-kickoff \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response status: $response"
          if [ "$response" != "200" ]; then
            echo "Error: endpoint returned $response"
            exit 1
          fi
